appId: com.awitwicki.astro-session-manager
productName: Astro Session Manager
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,*.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - 'node_modules/sharp/**/*'
mac:
  category: public.app-category.photography
  target:
    - target: dmg
      arch:
        - x64
        - arm64
win:
  target:
    - target: portable
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Graphics

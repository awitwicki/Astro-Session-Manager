name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Try to create tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install --frozen-lockfile

      - run: yarn electron-vite build && yarn electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: dist/*.dmg

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install --frozen-lockfile

      - run: yarn package:win

      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: dist/*.exe

  release:
    needs: [check-version, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            *.dmg
            *.exe

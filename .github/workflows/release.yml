name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Try to create tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping release"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

  build-mac-arm:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: yarn install --frozen-lockfile

      - run: yarn tauri build --target aarch64-apple-darwin

      - name: Ad-hoc codesign the app bundle
        run: |
          APP=$(find src-tauri/target/aarch64-apple-darwin/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
          fi

      - name: Remove quarantine attribute from DMG
        run: xattr -cr src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm-builds
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-mac-intel:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: yarn install --frozen-lockfile

      - run: yarn tauri build --target x86_64-apple-darwin

      - name: Ad-hoc codesign the app bundle
        run: |
          APP=$(find src-tauri/target/x86_64-apple-darwin/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
          fi

      - name: Remove quarantine attribute from DMG
        run: xattr -cr src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-intel-builds
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: yarn install --frozen-lockfile

      - run: yarn tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.tag_created == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: yarn install --frozen-lockfile

      - run: yarn tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [check-version, build-mac-arm, build-mac-intel, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            *.dmg
            *.exe
            *.deb
            *.AppImage
